<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Website</title>
<style>
* {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
    }

    body {
        background: linear-gradient(blue,purple);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .container {
        background: linear-gradient(rgb(104, 141, 222),rgb(160, 105, 174));
        width: 400px;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .balance {
        text-align: center;
        margin-bottom: 20px;
    }

    .summary {
        display: flex;
        justify-content: space-between;
        background: #f0f0f0;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 20px;
    }

    .summary div {
        text-align: center;
        flex: 1;
    }

    .money.plus {
        color: green;
    }

    .money.minus {
        color: red;
    }

    .list {
        list-style: none;
        margin-bottom: 20px;
        max-height: 150px;
        overflow-y: auto;
    }

    .list li {
        display: flex;
        justify-content: space-between;
        padding: 10px;
        border-right: 5px solid;
        margin-bottom: 10px;
        background: #fafafa;
        border-radius: 5px;
    }

    .list li.plus {
        border-color: green;
    }

    .list li.minus {
        border-color: red;
    }

    .delete-btn {
        background: red;
        color: #fff;
        border: none;
        padding: 3px 7px;
        cursor: pointer;
        border-radius: 3px;
    }

    form input {
        width: 100%;
        padding: 8px;
        margin-bottom: 10px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    form button {
        width: 100%;
        padding: 10px;
        border: none;


        background: #007bff;
        color: #fff;
        border-radius: 5px;
        cursor: pointer;
    }

    form button:hover {
        background: #0056b3;
    }

</style>
</head>
<div class="container">
    <h2>Expense Tracker</h2>

    <div class="balance">
        <h4>Your Balance</h4>
        <h2 id="balance">$0.00</h2>
    </div>

    <div class="summary">
        <div>
            <h4>Income</h4>
            <p id="income" class="money plus">₹00</p>
        </div>
        <div>
            <h4>Expense</h4>
            <p id="expense" class="money minus">₹00</p>
        </div>
    </div>

    <h4>History</h4>
    <ul id="list" class="list"></ul>

    <h4>Add New Transaction</h4>
    <form id="form">
        <input type="text" id="text" placeholder="Enter description..." required>
        <input type="number" id="amount" placeholder="Enter amount (+income, -expense)" required>
        <button type="submit">Add Transaction</button>
    </form>
</div>

<script>
    const balance = document.getElementById('balance');
    const income = document.getElementById('income');
    const expense = document.getElementById('expense');
    const list = document.getElementById('list');
    
    const form = document.getElementById('form');
    const text = document.getElementById('text');
    const amount = document.getElementById('amount');
 


    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

    function addTransactionDOM(transaction) {
        const sign = transaction.amount < 0 ? '-' : '+';
        const item = document.createElement('li');
        item.classList.add(transaction.amount < 0 ? 'minus' : 'plus');

        item.innerHTML = `
            ${transaction.text}
            <span>${sign}₹${Math.abs(transaction.amount).toFixed(2)}</span>
            <button class="delete-btn" onclick="removeTransaction(${transaction.id})">x</button>
        `;
        list.appendChild(item);
    }

    function updateValues() {
        const amounts = transactions.map(t => t.amount);

        const total = amounts.reduce((acc, item) => acc + item, 0).toFixed(2);
        const incomeTotal = amounts
            .filter(item => item > 0)
            .reduce((acc, item) => acc + item, 0)
            .toFixed(2);
        const expenseTotal = (
            amounts
                .filter(item => item < 0)
                .reduce((acc, item) => acc + item, 0) * -1
        ).toFixed(2);

        balance.innerText = `₹${total}`;
        income.innerText = `₹ ${incomeTotal}`;
        expense.innerText = `₹${expenseTotal}`;
    }

    function addTransaction(e) {
        e.preventDefault();

        if (text.value.trim() === '' || amount.value.trim() === '') {
            alert('Please add description and amount');
        } else {
            const transaction = {
                id: Date.now(),
                text: text.value,
                amount: +amount.value
            };

            transactions.push(transaction);
            addTransactionDOM(transaction);
            updateValues();
            updateLocalStorage();

            text.value = '';
            amount.value = '';
        }
    }

    function removeTransaction(id) {
        transactions = transactions.filter(t => t.id !== id);
        updateLocalStorage();
        init();
    }

    function updateLocalStorage() {
        localStorage.setItem('transactions', JSON.stringify(transactions));
    }

    function init() {
        list.innerHTML = '';
        transactions.forEach(addTransactionDOM);
        updateValues();
    }
    form.addEventListener('submit', addTransaction);
    init();
</script>
</body>
</html>
